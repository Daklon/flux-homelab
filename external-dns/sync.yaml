apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
    name: external-dns
    namespace: flux-system
spec:
    interval: 10m0s
    url: https://kubernetes-sigs.github.io/external-dns/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: external-dns
    namespace: flux-system
spec:
    releaseName: external-dns
    chart:
        spec:
            chart: external-dns
            reconcileStrategy: ChartVersion
            sourceRef:
                kind: HelmRepository
                name: external-dns
    targetNamespace: external-dns
    install:
        createNamespace: true
        remediation:
            retries: 1
    interval: 10m0s
    values:
        provider:
            name: webhook
            webhook:
              image:
                repository: ghcr.io/crutonjohn/external-dns-opnsense-webhook
                tag: v1.0.0
            env:
              - name: OPNSENSE_API_SECRET
                valueFrom:
                  secretKeyRef:
                    name: external-dns-opnsense-secret
                    key: api_secret
              - name: OPNSENSE_API_KEY
                valueFrom:
                  secretKeyRef:
                    name: external-dns-opnsense-secret
                    key: api_key
              - name: OPNSENSE_API_HOST
                value: "https://192.168.1.1"
              - name: OPNSENSE_SKIP_TLS_VERIFY
                value: "true"
              - name: LOG_LEVEL
                value: "debug"
            livenessProbe:
              httpGet:
                path: /healthz
                port: http-wh-metrics
              initialDelaySeconds: 10
              timeoutSeconds: 5
            readinessProbe:
              httpGet:
                path: /readyz
                port: http-wh-metrics
              initialDelaySeconds: 10
              timeoutSeconds: 5
        policy: sync
        sources: ["ingress", "service", "crd" ]
        registry: noop
        domainFilters: ["plasm.es"]
