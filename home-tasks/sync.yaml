---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: home-tasks
  namespace: flux-system
spec:
  interval: 10m0s
  ref:
    branch: main
  url: https://github.com/bender-916/home-tasks

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-tasks
  namespace: flux-system
spec:
  interval: 10m0s
  releaseName: home-tasks
  targetNamespace: home-tasks
  install:
    createNamespace: true
    remediation:
      retries: 1
  upgrade:
    remediation:
      retries: 1
  chart:
    spec:
      chart: ./k8s/helm/home-tasks
      sourceRef:
        kind: GitRepository
        name: home-tasks
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/bender-916/home-tasks
      tag: latest
      pullPolicy: Always
    
    service:
      type: ClusterIP
      port: 80
      targetPort: 5000
    
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: ovh
      hosts:
        - host: limpia.plasm.es
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: limpia-tls
          hosts:
            - limpia.plasm.es
    
    persistence:
      enabled: true
      size: 1Gi
      storageClass: openebs-hostpath
    
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 128Mi
