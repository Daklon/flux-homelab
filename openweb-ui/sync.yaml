---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openwebui-helm
  namespace: flux-system
spec:
  interval: 10m0s
  url: https://helm.openwebui.com/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openwebui
  namespace: flux-system
spec:
  releaseName: open-webui
  chart:
    spec:
      chart: open-webui
      version: "14.2.0"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: openwebui-helm
  targetNamespace: openwebui
  install:
    createNamespace: true
    remediation:
      retries: 1
  interval: 10m0s
  values:
    ollama:
      enabled: false
    openai:
      enabled: true
      apiKey: ""
      baseUrl: "http://192.168.1.144:8001"
    enableOpenaiApi: true
    
    replicaCount: 1

    image:
      repository: ghcr.io/open-webui/open-webui
      tag: "0.9.2"
      pullPolicy: IfNotPresent

    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1024Mi"
        cpu: "500m"

    persistence:
      enabled: true
      storageClass: "openebs-hostpath"
      size: 5Gi

    ingress:
      enabled: true
      class: traefik
      annotations:
        cert-manager.io/cluster-issuer: "ovh"
      host: chat.plasm.es
      tls: true
      existingSecret: openwebui-plasm-es-tls
