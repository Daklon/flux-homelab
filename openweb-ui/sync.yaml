---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openwebui-helm
  namespace: flux-system
spec:
  interval: 10m0s
  url: https://helm.openwebui.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openwebui
  namespace: flux-system
spec:
  releaseName: openwebui
  chart:
    spec:
      chart: open-webui
      version: "*"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: openwebui-helm
  targetNamespace: openwebui
  install:
    createNamespace: true
    remediation:
      retries: 1
  interval: 10m0s
  values:
    ollama:
      enabled: false
    ollamaUrls: ["http://192.168.1.144:11434"]

    enableOpenaiApi: false
    
    replicaCount: 1

    image:
      repository: ghcr.io/open-webui/open-webui
      tag: latest
      pullPolicy: IfNotPresent

    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1024Mi"
        cpu: "500m"

    persistence:
      enabled: true
      storageClass: "openebs-hostpath"
      size: 5Gi

    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: "ovh"
      hosts:
        - host: openwebui.plasm.es
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - openwebui.plasm.es
          secretName: openwebui-plasm-es-tls

    service:
      type: ClusterIP
      port: 80
      targetPort: 8080
